# Render.com deployment configuration
services:
  - type: web
    name: agentic-rag
    runtime: python
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: API_SECRET
        generateValue: true
      - key: HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: INFO
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
